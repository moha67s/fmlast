<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;600;900&family=Space+Grotesk:wght@300;700&display=swap');

        :root {
            --accent: {{compatColor}};
            --bg-black: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 700px;
            background: var(--bg-black);
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MOSAIC BACKGROUND: CLEAN & VISIBLE */
        #mosaic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            filter: grayscale(0.2) brightness(0.5) contrast(1.1);
            z-index: -2;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* MASSIVE LEGIBLE SCORE */
        #giant-score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 450px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.22);
            z-index: 0;
            user-select: none;
            letter-spacing: -20px;
            font-weight: 700;
        }

        /* CONTENT LAYER */
        #layout {
            position: relative;
            z-index: 1;
            width: 1120px;
            height: 640px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* MINIMALIST HEADERS */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-node {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .name {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* CENTER TIER: WIDE EDITORIAL */
        .center-score {
            text-align: center;
            margin-top: -20px;
        }

        .tier-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 34px;
            letter-spacing: 6px;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(var(--accent-rgb), 0.4);
        }

        /* ARTIST LISTS: CLEAN TEXT */
        .main-columns {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 40px;
            margin-top: 20px;
        }

        .artist-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .artist-item {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .artist-item.shared {
            color: #fff;
            font-weight: 900;
        }

        .shared::before {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        /* MASSIVE GALLERY */
        .gallery-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 30px;
        }

        .gallery-art {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .period-tag {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

    </style>
</head>
<body style="--accent: {{compatColor}};">
    <div id="mosaic">
        {{#each mosaicCovers}}
        <div class="tile" style="background-image: url('{{this}}')"></div>
        {{/each}}
    </div>
    <div id="vignette"></div>
    <div id="giant-score">{{compatScore}}</div>

    <div id="layout">
        <!-- Minimal Headers -->
        <div class="header">
            <div class="user-node">
                <img src="{{userA.avatarUrl}}" class="avatar">
                <div class="name">{{userA.displayName}}</div>
            </div>

            <div class="center-score">
                <div class="tier-text">{{scoreLabel}}</div>
            </div>

            <div class="user-node" style="flex-direction: row-reverse; text-align: right;">
                <img src="{{userB.avatarUrl}}" class="avatar">
                <div class="name">{{userB.displayName}}</div>
            </div>
        </div>

        <!-- Clean Columns -->
        <div class="main-columns">
            <div class="artist-list">
                <div class="list-header">Profile Alpha</div>
                {{#each userA.topArtists}}
                <div class="artist-item {{#if isShared}}shared{{/if}}">
                    {{name}}
                </div>
                {{/each}}
            </div>

            <div></div> <!-- Spacer for Score -->

            <div class="artist-list" style="text-align: right;">
                <div class="list-header">Profile Beta</div>
                {{#each userB.topArtists}}
                <div class="artist-item {{#if isShared}}shared{{/if}}" style="flex-direction: row-reverse;">
                    {{name}}
                </div>
                {{/each}}
            </div>
        </div>

        <!-- Massive Gallery -->
        <div class="gallery-row">
            {{#each bridgeTracks}}
            <img src="{{coverUrl}}" class="gallery-art">
            {{/each}}
        </div>

        <div class="period-tag">{{periodLabel}}</div>
    </div>

    <script>
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255, 255, 255';
        }
        document.body.style.setProperty('--accent-rgb', hexToRgb('{{compatColor}}'));
    </script>
</body>
</html>
