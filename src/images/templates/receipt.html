<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier Prime', monospace;
            color: #000;
        }
        .receipt-container {
            background-color: #fff;
            width: 320px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        .receipt-container::before, .receipt-container::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background-size: 20px 20px;
        }
        .receipt-container::before {
            top: -10px;
            background-image: radial-gradient(circle at 10px 0, transparent 10px, #fff 11px);
        }
        .receipt-container::after {
            bottom: -10px;
            background-image: radial-gradient(circle at 10px 10px, transparent 10px, #fff 11px);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 12px;
        }
        .divider {
            border-top: 2px dashed #000;
            margin: 15px 0;
        }
        .meta {
            font-size: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        .items {
            width: 100%;
            margin-bottom: 20px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .item-name {
            width: 75%;
            word-wrap: break-word;
        }
        .item-count {
            width: 25%;
            text-align: right;
        }
        .total-section {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        .barcode-container {
            text-align: center;
            margin-top: 30px;
        }
        .barcode {
            font-family: 'Libre Barcode 39', cursive; /* Generic fallback or just blocks */
            font-size: 40px;
            letter-spacing: 2px;
        }
        .footer {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
        }
        /* Fallback barcode using pure CSS if font fails */
        .css-barcode {
            display: inline-block;
            height: 40px;
            width: 100%;
            background: repeating-linear-gradient(
                to right,
                #000,
                #000 2px,
                #fff 2px,
                #fff 4px,
                #000 4px,
                #000 8px,
                #fff 8px,
                #fff 10px
            );
        }
    </style>
</head>
<body>
    <div class="receipt-container">
        <div class="header">
            <h1>LAST.FM RECEIPT</h1>
            <p>{{username}}</p>
        </div>
        
        <div class="meta">
            <span>ORDER: #{{orderNumber}}</span>
            <span>DATE: {{date}}</span>
        </div>
        
        <div class="meta">
            <span>PERIOD: {{periodLabel}}</span>
            <span>TYPE: {{typeLabel}}</span>
        </div>

        <div class="divider"></div>

        <div class="items">
            <div class="item" style="font-weight: 700; margin-bottom: 15px;">
                <div class="item-name">ITEM</div>
                <div class="item-count">PLAYS</div>
            </div>
            
            {{#each items}}
            <div class="item">
                <div class="item-name">{{this.rank}}. {{this.name}}</div>
                <div class="item-count">{{this.playcount}}</div>
            </div>
            {{/each}}
        </div>

        <div class="divider"></div>

        <div class="total-section">
            <div>TOTAL SCROBBLES</div>
            <div>{{totalScrobbles}}</div>
        </div>

        <div class="barcode-container">
            <div class="css-barcode"></div>
            <div style="font-size: 10px; margin-top: 5px; letter-spacing: 5px;">{{username}}</div>
        </div>
        
        <div class="footer">
            <p>THANK YOU FOR LISTENING!</p>
            <p>Generated by fm2</p>
        </div>
    </div>
</body>
</html>
