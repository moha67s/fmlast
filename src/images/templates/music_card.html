<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            width: 900px;
            height: 300px;
            font-family: 'Outfit', sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card {
            width: 860px;
            height: 260px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{artworkUrl}}');
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            z-index: -1;
        }

        .artwork {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .info {
            flex: 1;
            margin-left: 35px;
            color: white;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .now-playing-badge {
            font-size: 14px;
            font-weight: 800;
            color: #1DB954;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .title {
            font-size: 36px;
            font-weight: 800;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 500px;
            line-height: 1.2;
        }

        .artist {
            font-size: 24px;
            font-weight: 400;
            opacity: 0.8;
            margin: 5px 0 20px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 500px;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #1DB954;
            border-radius: 3px;
            width: {{progress}}%;
            box-shadow: 0 0 10px #1DB954;
        }

        .time {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.6;
            min-width: 80px;
        }

        .requester {
            position: absolute;
            bottom: 25px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.5;
            font-size: 14px;
        }

        .requester img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="background-blur"></div>
        <img src="{{artworkUrl}}" class="artwork" />
        <div class="info">
            <div class="now-playing-badge">Now Playing</div>
            <h1 class="title">{{title}}</h1>
            <h2 class="artist">{{artist}}</h2>
            <div class="progress-container">
                <div class="time">{{currentPos}}</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="time">{{totalPos}}</div>
            </div>
        </div>
        <div class="requester">
            <span>{{requester}}</span>
        </div>
    </div>
</body>
</html>
